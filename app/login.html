<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
  <title>Sign in — Cyrus</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-4" style="touch-action: manipulation;">
  <div class="w-full max-w-sm rounded-xl bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 p-6">
    <h1 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-1">Cyrus</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Enter the dashboard password to continue.</p>
    <form id="f" class="space-y-4">
      <div>
        <label for="p" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">Password</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required
          class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" />
      </div>
      <p id="err" class="text-sm text-red-600 dark:text-red-400 hidden"></p>
      <button type="submit" id="btn"
        class="w-full rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 transition-colors disabled:opacity-50">
        Sign in
      </button>
    </form>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async function (e) {
      e.preventDefault();
      var err = document.getElementById('err');
      var btn = document.getElementById('btn');
      err.classList.add('hidden');
      btn.disabled = true;
      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ password: document.getElementById('p').value }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          err.textContent = data.error || 'Sign in failed';
          err.classList.remove('hidden');
          return;
        }
        window.location.replace('/');
      } catch (x) {
        err.textContent = 'Network error';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
