<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
  <title>Sign in — Cyrus</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cyrus">
  <link rel="stylesheet" href="/pwa-install-banner.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-4" style="touch-action: manipulation;">
  <div class="w-full max-w-sm rounded-xl bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 p-6">
    <h1 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-1">Cyrus</h1>
    <p id="hint" class="text-sm text-slate-500 dark:text-slate-400 mb-5">Checking sign-in…</p>
    <form id="f" class="space-y-4 hidden">
      <div id="loginWrap" class="hidden">
        <label for="login" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">Login</label>
        <input id="login" name="login" type="text" autocomplete="username"
          class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" />
      </div>
      <div>
        <label for="p" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">Password</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required
          class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-3 py-2 text-slate-900 dark:text-slate-100 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" />
      </div>
      <p id="err" class="text-sm text-red-600 dark:text-red-400 hidden"></p>
      <button type="submit" id="btn"
        class="w-full rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 transition-colors disabled:opacity-50">
        Sign in
      </button>
    </form>
  </div>
  <script>
    (async function () {
      var hint = document.getElementById('hint');
      var form = document.getElementById('f');
      var loginWrap = document.getElementById('loginWrap');
      var multi = false;
      try {
        var st = await fetch('/api/auth-status', { credentials: 'include' });
        var d = await st.json().catch(function () { return {}; });
        multi = !!d.multiUser;
      } catch (e) {}
      hint.textContent = multi
        ? 'Enter your login and password to continue.'
        : 'Enter the dashboard password to continue.';
      if (multi) {
        loginWrap.classList.remove('hidden');
        document.getElementById('login').required = true;
      }
      form.classList.remove('hidden');

      document.getElementById('f').addEventListener('submit', async function (e) {
        e.preventDefault();
        var err = document.getElementById('err');
        var btn = document.getElementById('btn');
        err.classList.add('hidden');
        btn.disabled = true;
        try {
          var body = multi
            ? { login: document.getElementById('login').value.trim(), password: document.getElementById('p').value }
            : { password: document.getElementById('p').value };
          var res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(body),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            err.textContent = data.error || 'Sign in failed';
            err.classList.remove('hidden');
            return;
          }
          window.location.replace('/');
        } catch (x) {
          err.textContent = 'Network error';
          err.classList.remove('hidden');
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
  <script defer src="/js/pwa-install-banner.js"></script>
</body>
</html>
