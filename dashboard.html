<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launchpad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --bg:           #F9F9F7;
  --surface:      #FFFFFF;
  --border:       #E8E8E4;
  --border-light: #F0F0EC;
  --text:         #1C1C18;
  --text-2:       #4A4A44;
  --muted:        #9A9A92;

  --green:        #1F7A4A;
  --green-bg:     #EBF7F1;
  --orange:       #B85A14;
  --orange-bg:    #FEF3E7;
  --red:          #B83232;
  --red-bg:       #FDEDEC;
  --blue:         #2462B8;
  --blue-bg:      #EBF2FD;
  --purple:       #6640B0;
  --purple-bg:    #F2EEFF;
  --yellow:       #9A6C0A;
  --yellow-bg:    #FEF8E3;

  --radius:       8px;
  --radius-sm:    5px;
  --shadow:       0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);

  --row-hover:    #FAFAF8;
  --responded-bg: #E8F4FF;
  --responded-fg: #1A68A0;

  --dot-active-bg: var(--text);
  --dot-active-fg: #fff;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #111110;
    --surface:      #1C1C1A;
    --border:       #2E2E2A;
    --border-light: #252522;
    --text:         #EDEDEA;
    --text-2:       #ADADA6;
    --muted:        #636360;

    --green:        #3DB87A;
    --green-bg:     #0D2B1C;
    --orange:       #E07840;
    --orange-bg:    #2A1706;
    --red:          #E05555;
    --red-bg:       #2B0D0D;
    --blue:         #5B8FE8;
    --blue-bg:      #0D1E38;
    --purple:       #9B78E0;
    --purple-bg:    #1C1030;
    --yellow:       #CCA030;
    --yellow-bg:    #261E07;

    --shadow:       0 1px 4px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);

    --row-hover:    #222220;
    --responded-bg: #0D1E2E;
    --responded-fg: #5B9FD0;

    --dot-active-bg: #EDEDEA;
    --dot-active-fg: #111110;
  }
}

/* ============================================================
   LAYOUT
   ============================================================ */
.page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 20;
}
.header-left { display: flex; align-items: baseline; gap: 10px; }
.header-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-meta { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-db-status { font-size: 12px; color: var(--muted); }

.btn-load {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  color: var(--text-2);
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.btn-load:hover { border-color: var(--muted); box-shadow: var(--shadow); }
#file-input { display: none; }

/* ============================================================
   LOADER SCREEN
   ============================================================ */
#loader-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 56vh;
  gap: 14px;
  text-align: center;
}
#loader-screen h2 { font-size: 19px; font-weight: 600; }
#loader-screen p { color: var(--muted); font-size: 13px; max-width: 320px; line-height: 1.65; }
.db-path { background: var(--border); padding: 2px 7px; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; font-size: 12px; }
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  background: var(--dot-active-bg);
  color: var(--dot-active-fg);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.12s;
}
.btn-primary:hover { opacity: 0.82; }

/* ============================================================
   SECTIONS
   ============================================================ */
.section { margin-bottom: 36px; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty {
  padding: 20px;
  text-align: center;
  color: var(--muted);
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  font-size: 13px;
}

/* ============================================================
   ACTION ITEMS (Today's Focus)
   ============================================================ */
.action-list { display: flex; flex-direction: column; gap: 7px; }
.action-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.action-item.overdue  { border-left-color: var(--red); }
.action-item.today    { border-left-color: var(--orange); }
.action-item.upcoming { border-left-color: var(--blue); }
.action-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  min-width: 100px;
  flex-shrink: 0;
}
.action-detail { flex: 1; font-size: 13px; color: var(--text); }
.action-date {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
.action-item.overdue  .action-date { background: var(--red-bg);    color: var(--red); }
.action-item.today    .action-date { background: var(--orange-bg); color: var(--orange); }
.action-item.upcoming .action-date { background: var(--blue-bg);   color: var(--blue); }

/* ============================================================
   WEEK CARD
   ============================================================ */
.week-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.week-left  { padding: 22px 24px; border-right: 1px solid var(--border); }
.week-right { padding: 22px 24px; }
.week-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.week-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; letter-spacing: -0.2px; }
.week-theme { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 14px; }
.week-dates { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

.prog-row { margin-bottom: 12px; }
.prog-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.prog-labels strong { color: var(--text-2); }
.prog-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 99px; }

.retro { margin-top: 14px; font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.6; }

.goals-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.goal-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.4;
}
.goal-box {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
  margin-top: 1px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}
.goal-item.met .goal-box { background: var(--green); border-color: var(--green); color: #fff; }
.goal-item.met .goal-text { text-decoration: line-through; color: var(--muted); }

/* ============================================================
   WEEKS TIMELINE
   ============================================================ */
.weeks-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.wk {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.wk-dot {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  border: 2px solid var(--border);
  color: var(--muted);
  background: var(--surface);
}
.wk-dot.active   { background: var(--dot-active-bg); border-color: var(--dot-active-bg); color: var(--dot-active-fg); }
.wk-dot.complete { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.wk-label { font-size: 10px; color: var(--muted); }
.wk-connector { flex: 1; height: 1px; background: var(--border); margin-bottom: 17px; }

/* ============================================================
   PIPELINE FUNNEL
   ============================================================ */
.funnel {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.funnel-stage {
  flex: 1;
  padding: 14px 12px;
  border-right: 1px solid var(--border);
  text-align: center;
  min-width: 0;
}
.funnel-stage:last-child { border-right: none; }
.funnel-stage.live { background: var(--blue-bg); }
.funnel-stage.won  { background: var(--green-bg); }
.funnel-count { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); line-height: 1; margin-bottom: 4px; }
.funnel-count.live-n { color: var(--blue); }
.funnel-count.won-n  { color: var(--green); }
.funnel-label { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   DATA TABLE
   ============================================================ */
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: left;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.tbl td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--row-hover); }
.tbl .lane-hd td {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 10px 14px 4px;
  background: var(--bg);
  border-bottom: none;
}
.tbl .task-done td { color: var(--muted); }
.tbl .task-done .task-title { text-decoration: line-through; }

/* ============================================================
   BADGE
   ============================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
/* Task statuses */
.s-todo        { background: var(--border);     color: var(--muted); }
.s-in_progress { background: var(--blue-bg);    color: var(--blue); }
.s-done        { background: var(--green-bg);   color: var(--green); }
.s-skipped     { background: var(--border);     color: var(--muted); opacity: 0.6; }
/* App statuses */
.s-researching  { background: var(--border);     color: var(--text-2); }
.s-applied      { background: var(--blue-bg);    color: var(--blue); }
.s-responded    { background: var(--responded-bg); color: var(--responded-fg); }
.s-phone_screen { background: var(--yellow-bg);  color: var(--yellow); }
.s-interview_1, .s-interview_2, .s-interview_final { background: var(--purple-bg); color: var(--purple); }
.s-offer        { background: var(--green-bg);   color: var(--green); }
.s-accepted     { background: var(--green-bg);   color: var(--green); }
.s-rejected, .s-ghosted, .s-withdrawn { background: var(--red-bg); color: var(--red); }
/* Consulting statuses */
.s-lead         { background: var(--border);     color: var(--text-2); }
.s-conversation { background: var(--blue-bg);    color: var(--blue); }
.s-proposal_sent { background: var(--yellow-bg); color: var(--yellow); }
.s-negotiating  { background: var(--orange-bg);  color: var(--orange); }
.s-won          { background: var(--green-bg);   color: var(--green); }
.s-lost         { background: var(--red-bg);     color: var(--red); }
/* Outreach statuses */
.s-pending         { background: var(--yellow-bg); color: var(--yellow); }
.s-replied         { background: var(--green-bg);  color: var(--green); }
.s-no_reply        { background: var(--border);    color: var(--muted); }
.s-meeting_booked  { background: var(--purple-bg); color: var(--purple); }

/* ============================================================
   STATS ROW
   ============================================================ */
.stats-row { display: flex; gap: 10px; flex-wrap: wrap; }
.stat {
  flex: 1;
  min-width: 100px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); line-height: 1; }
.stat-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ============================================================
   TWO COLUMNS
   ============================================================ */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

/* ============================================================
   CARD (simple container)
   ============================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}
.card-total { font-size: 24px; font-weight: 700; color: var(--green); letter-spacing: -0.4px; margin-bottom: 14px; }

.money-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.money-row:last-child { border-bottom: none; }
.money-label { color: var(--text); font-weight: 500; }
.money-value { font-weight: 700; color: var(--green); }
.money-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; text-align: right; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 680px) {
  .week-card { grid-template-columns: 1fr; }
  .week-left { border-right: none; border-bottom: 1px solid var(--border); }
  .two-col { grid-template-columns: 1fr; }
  .funnel { flex-wrap: wrap; }
  .funnel-stage { min-width: calc(50% - 0.5px); }
  .action-tag { display: none; }
  .wk-connector { display: none; }
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <span class="header-logo">Launchpad</span>
      <span class="header-meta" id="header-meta"></span>
    </div>
    <div class="header-right">
      <span class="header-db-status" id="db-status"></span>
      <button class="btn-load" id="btn-refresh" onclick="document.getElementById('file-input').click()" style="display:none">
        ↻ Refresh
      </button>
      <button class="btn-load" id="btn-load" onclick="document.getElementById('file-input').click()">
        ↑ Load Database
      </button>
      <input type="file" id="file-input" accept=".db,.sqlite,.sqlite3" onchange="handleFile(event)">
    </div>
  </header>

  <!-- LOADER SCREEN -->
  <div id="loader-screen">
    <div style="font-size:36px;margin-bottom:4px">⬡</div>
    <h2 id="loader-title">Opening database…</h2>
    <p id="loader-desc" style="color:var(--muted);font-size:13px;max-width:320px;line-height:1.65"></p>
    <button class="btn-primary" id="loader-btn" onclick="document.getElementById('file-input').click()" style="display:none">
      Choose File
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">

    <!-- TODAY'S FOCUS -->
    <div class="section">
      <div class="section-title">Today's Focus</div>
      <div id="focus"></div>
    </div>

    <!-- CURRENT WEEK -->
    <div class="section">
      <div class="section-title">Current Week</div>
      <div id="week-card"></div>
    </div>

    <!-- 8-WEEK TIMELINE -->
    <div class="section">
      <div class="section-title">8-Week Plan</div>
      <div id="timeline" class="weeks-row"></div>
    </div>

    <!-- THIS WEEK'S TASKS -->
    <div class="section">
      <div class="section-title">This Week's Tasks</div>
      <div id="tasks"></div>
    </div>

    <!-- JOB PIPELINE -->
    <div class="section">
      <div class="section-title">Job Pipeline</div>
      <div id="pipeline"></div>
    </div>

    <!-- OUTREACH QUEUE -->
    <div class="section">
      <div class="section-title">Outreach Queue</div>
      <div id="outreach"></div>
    </div>

    <!-- CONSULTING + INCOME -->
    <div class="two-col">
      <div class="section">
        <div class="section-title">Consulting Pipeline</div>
        <div id="consulting"></div>
      </div>
      <div class="section">
        <div class="section-title">Income</div>
        <div id="income"></div>
      </div>
    </div>

  </div><!-- /dashboard -->
</div><!-- /page -->

<script>
// ============================================================
// DB INIT + INDEXEDDB CACHE
// ============================================================
let SQL = null;
let db  = null;

const IDB_NAME    = 'launchpad-dashboard';
const IDB_STORE   = 'cache';
const IDB_KEY     = 'db';

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess  = e => res(e.target.result);
    req.onerror    = e => rej(e.target.error);
  });
}

async function idbGet(key) {
  const idb = await openIDB();
  return new Promise((res, rej) => {
    const tx  = idb.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

async function idbSet(key, value) {
  const idb = await openIDB();
  return new Promise((res, rej) => {
    const tx  = idb.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).put(value, key);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

async function getSQL() {
  if (SQL) return SQL;
  SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
  });
  return SQL;
}

// Called on page load — try to restore from cache
async function autoLoad() {
  try {
    const cached = await idbGet(IDB_KEY);
    if (cached?.data) {
      const engine = await getSQL();
      db = new engine.Database(cached.data);
      showDashboard();
      const ago = timeSince(cached.savedAt);
      setStatus(`Loaded ${ago} ago`);
    } else {
      showLoader();
    }
  } catch (err) {
    console.warn('Cache read failed:', err);
    showLoader();
  }
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  setStatus('Loading…');
  try {
    const engine = await getSQL();
    const buf    = await file.arrayBuffer();
    const data   = new Uint8Array(buf);
    if (db) db.close();
    db = new engine.Database(data);
    // Persist to IndexedDB
    await idbSet(IDB_KEY, { data, savedAt: new Date().toISOString(), name: file.name });
    setStatus(`Updated just now`);
    showDashboard();
    render();
  } catch (err) {
    console.error(err);
    setStatus('Error — check console');
  }
}

function showDashboard() {
  document.getElementById('loader-screen').style.display = 'none';
  document.getElementById('dashboard').style.display     = 'block';
  document.getElementById('btn-load').style.display      = 'none';
  document.getElementById('btn-refresh').style.display   = '';
  render();
}

function showLoader() {
  document.getElementById('loader-title').textContent = 'Open your database';
  document.getElementById('loader-desc').innerHTML =
    `Select <span class="db-path">launchpad.db</span> to load the dashboard.<br>Located at <span class="db-path">/data/launchpad.db</span>`;
  document.getElementById('loader-btn').style.display = '';
}

function setStatus(msg) {
  document.getElementById('db-status').textContent = msg;
}

function timeSince(iso) {
  const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (secs < 60)   return `${secs}s`;
  if (secs < 3600) return `${Math.floor(secs / 60)}m`;
  if (secs < 86400) return `${Math.floor(secs / 3600)}h`;
  return `${Math.floor(secs / 86400)}d`;
}

// Boot
document.addEventListener('DOMContentLoaded', autoLoad);

// ============================================================
// QUERY HELPERS
// ============================================================
function q(sql, params) {
  try {
    const res = db.exec(sql, params);
    if (!res.length) return [];
    const { columns, values } = res[0];
    return values.map(row => Object.fromEntries(columns.map((c, i) => [c, row[i]])));
  } catch (err) {
    console.warn('SQL error:', err.message, '\n', sql);
    return [];
  }
}
function q1(sql, params) { return q(sql, params)[0] || null; }

// ============================================================
// RENDER ORCHESTRATOR
// ============================================================
function render() {
  const today = new Date().toISOString().split('T')[0];
  const aw = q1(`SELECT * FROM weeks WHERE status = 'active' LIMIT 1`);
  const wn = aw?.week_number;

  // Header
  const todayFmt = fmtDate(today);
  document.getElementById('header-meta').textContent =
    aw ? `Week ${wn} of 8  ·  ${todayFmt}` : todayFmt;

  renderFocus(today);
  renderWeekCard(aw, wn);
  renderTimeline();
  renderTasks(wn);
  renderPipeline();
  renderOutreach();
  renderConsulting();
  renderIncome();
}

// ============================================================
// TODAY'S FOCUS
// ============================================================
function renderFocus(today) {
  const items = q(`SELECT * FROM v_action_items ORDER BY due_date ASC`);
  const el = document.getElementById('focus');
  if (!items.length) {
    el.innerHTML = `<div class="empty">✓ Nothing due in the next 48 hours — you're clear.</div>`;
    return;
  }
  el.innerHTML = `<div class="action-list">${items.map(it => {
    const cls = urgency(it.due_date, today);
    const typeShort = {
      'Follow up on application': 'Application',
      'Outreach follow-up':       'Outreach',
      'Task due':                 'Task',
      'Interview prep':           'Interview',
    }[it.action_type] || it.action_type;
    return `<div class="action-item ${cls}">
      <span class="action-tag">${typeShort}</span>
      <span class="action-detail">${esc(it.detail)}</span>
      <span class="action-date">${it.due_date ? fmtDate(it.due_date) : '—'}</span>
    </div>`;
  }).join('')}</div>`;
}

// ============================================================
// WEEK CARD
// ============================================================
function renderWeekCard(aw, wn) {
  const el = document.getElementById('week-card');
  if (!aw) { el.innerHTML = `<div class="empty">No active week found in the database.</div>`; return; }

  const goals  = q(`SELECT * FROM weekly_goals WHERE week_number = ? ORDER BY id`, [wn]);
  const stats  = q1(`SELECT * FROM v_weekly_dashboard WHERE week_number = ?`, [wn]);
  const budget = aw.hours_budget || 15;
  const used   = stats?.hours_used || 0;
  const gMet   = stats?.goals_met  || 0;
  const gTotal = stats?.goals_total || goals.length;
  const tDone  = stats?.tasks_done  || 0;
  const tRem   = stats?.tasks_remaining || 0;
  const tTotal = tDone + tRem;

  const pBar = (pct) => `<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;

  el.innerHTML = `<div class="week-card">
    <div class="week-left">
      <div class="week-eyebrow">Week ${aw.week_number} of 8</div>
      <div class="week-title">${esc(aw.title)}</div>
      ${aw.theme ? `<div class="week-theme">${esc(aw.theme)}</div>` : ''}
      <div class="week-dates">${fmtDate(aw.start_date)} – ${fmtDate(aw.end_date)}</div>
      <div class="prog-row">
        <div class="prog-labels"><span>Hours</span><span><strong>${used}h</strong> / ${budget}h</span></div>
        ${pBar(Math.min(100, Math.round(used / budget * 100)))}
      </div>
      <div class="prog-row">
        <div class="prog-labels"><span>Goals</span><span><strong>${gMet}</strong> / ${gTotal} met</span></div>
        ${pBar(gTotal > 0 ? Math.round(gMet / gTotal * 100) : 0)}
      </div>
      <div class="prog-row">
        <div class="prog-labels"><span>Tasks</span><span><strong>${tDone}</strong> / ${tTotal} done</span></div>
        ${pBar(tTotal > 0 ? Math.round(tDone / tTotal * 100) : 0)}
      </div>
      ${aw.retro_notes ? `<div class="retro">${esc(aw.retro_notes)}</div>` : ''}
    </div>
    <div class="week-right">
      <div class="section-title" style="margin-bottom:10px">Goals</div>
      <ul class="goals-list">${goals.map(g => `
        <li class="goal-item ${g.is_met ? 'met' : ''}">
          <div class="goal-box">${g.is_met ? '✓' : ''}</div>
          <span class="goal-text">${esc(g.goal)}</span>
        </li>`).join('')}</ul>
    </div>
  </div>`;
}

// ============================================================
// 8-WEEK TIMELINE
// ============================================================
function renderTimeline() {
  const weeks = q(`SELECT w.week_number, w.status, d.tasks_done, d.tasks_remaining
    FROM weeks w LEFT JOIN v_weekly_dashboard d ON d.week_number = w.week_number
    ORDER BY w.week_number`);
  const el = document.getElementById('timeline');
  if (!weeks.length) { el.innerHTML = ''; return; }
  const parts = [];
  weeks.forEach((w, i) => {
    if (i > 0) parts.push(`<div class="wk-connector"></div>`);
    const cls = w.status === 'active' ? 'active' : w.status === 'complete' ? 'complete' : '';
    const lbl = w.status === 'active' ? 'Now' : w.status === 'complete' ? '✓' : `Wk ${w.week_number}`;
    parts.push(`<div class="wk">
      <div class="wk-dot ${cls}">${w.week_number}</div>
      <div class="wk-label">${lbl}</div>
    </div>`);
  });
  el.innerHTML = parts.join('');
}

// ============================================================
// TASKS
// ============================================================
function renderTasks(wn) {
  const el = document.getElementById('tasks');
  if (!wn) { el.innerHTML = `<div class="empty">No active week.</div>`; return; }
  const tasks = q(`SELECT * FROM tasks WHERE week_number = ?
    ORDER BY
      CASE status WHEN 'in_progress' THEN 0 WHEN 'todo' THEN 1 WHEN 'done' THEN 2 ELSE 3 END,
      due_date ASC`, [wn]);
  if (!tasks.length) { el.innerHTML = `<div class="empty">No tasks added for this week yet.</div>`; return; }

  const laneLabel = { job_search: 'Job Search', consulting: 'Consulting', network_content: 'Network & Content', admin: 'Admin' };
  const laneOrder = ['job_search', 'consulting', 'network_content', 'admin'];
  const byLane = {};
  tasks.forEach(t => { (byLane[t.lane] = byLane[t.lane] || []).push(t); });

  const rows = laneOrder.filter(l => byLane[l]).flatMap(lane => {
    return byLane[lane].map((t, i) => {
      const done = t.status === 'done';
      return `<tr class="${done ? 'task-done' : ''}">
        <td style="color:var(--muted);font-size:12px">${i === 0 ? (laneLabel[lane] || lane) : ''}</td>
        <td>
          <span class="task-title">${esc(t.title)}</span>
          ${t.notes ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(t.notes)}</div>` : ''}
        </td>
        <td><span class="badge s-${t.status}">${fmtStatus(t.status)}</span></td>
        <td style="color:var(--muted)">${t.hours_actual ? t.hours_actual + 'h' : t.hours_estimated ? '~' + t.hours_estimated + 'h' : '—'}</td>
        <td style="font-size:12px;color:var(--muted)">${t.due_date ? fmtDate(t.due_date) : '—'}</td>
      </tr>`;
    });
  }).join('');

  el.innerHTML = `<div class="tbl-wrap"><table class="tbl">
    <thead><tr>
      <th style="width:130px">Lane</th>
      <th>Task</th>
      <th style="width:100px">Status</th>
      <th style="width:64px">Hrs</th>
      <th style="width:90px">Due</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ============================================================
// JOB PIPELINE
// ============================================================
function renderPipeline() {
  const el = document.getElementById('pipeline');
  const pipelineRows = q(`SELECT * FROM v_pipeline`);
  const apps = q(`SELECT a.*, c.name AS co FROM applications a
    JOIN companies c ON a.company_id = c.id
    WHERE a.status NOT IN ('rejected','withdrawn','ghosted','accepted')
    ORDER BY CASE a.status
      WHEN 'offer' THEN 1 WHEN 'interview_final' THEN 2 WHEN 'interview_2' THEN 3
      WHEN 'interview_1' THEN 4 WHEN 'phone_screen' THEN 5 WHEN 'responded' THEN 6
      WHEN 'applied' THEN 7 ELSE 8 END, a.next_step_date ASC`);

  if (!pipelineRows.length && !apps.length) {
    el.innerHTML = `<div class="empty">No applications yet — add companies to start the pipeline.</div>`;
    return;
  }

  const stageOrder  = ['offer','interview_final','interview_2','interview_1','phone_screen','responded','applied','researching'];
  const stageLabels = { offer:'Offer', interview_final:'Final', interview_2:'Round 2', interview_1:'Round 1', phone_screen:'Screen', responded:'Responded', applied:'Applied', researching:'Researching' };
  const pmap = Object.fromEntries(pipelineRows.map(p => [p.status, p.count]));
  const active = stageOrder.filter(s => pmap[s] > 0);

  const funnelHTML = active.length ? `<div class="funnel">${active.map(s => {
    const isWon = s === 'offer';
    const cnt = pmap[s] || 0;
    return `<div class="funnel-stage ${isWon ? 'won' : 'live'}">
      <div class="funnel-count ${isWon ? 'won-n' : 'live-n'}">${cnt}</div>
      <div class="funnel-label">${stageLabels[s]}</div>
    </div>`;
  }).join('')}</div>` : '';

  const tableHTML = apps.length ? `<div class="tbl-wrap"><table class="tbl">
    <thead><tr>
      <th>Company</th>
      <th>Role</th>
      <th style="width:120px">Status</th>
      <th>Next Step</th>
      <th style="width:86px">By</th>
    </tr></thead>
    <tbody>${apps.map(a => `<tr>
      <td style="font-weight:500">${esc(a.co)}</td>
      <td style="color:var(--text-2)">${esc(a.role_title)}</td>
      <td><span class="badge s-${a.status}">${fmtStatus(a.status)}</span></td>
      <td style="font-size:12px;color:var(--muted)">${a.next_step ? esc(a.next_step) : '—'}</td>
      <td style="font-size:12px;color:var(--muted)">${a.next_step_date ? fmtDate(a.next_step_date) : '—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>` : '';

  el.innerHTML = funnelHTML + tableHTML;
}

// ============================================================
// OUTREACH
// ============================================================
function renderOutreach() {
  const el = document.getElementById('outreach');
  const rows = q(`SELECT * FROM v_outreach_status
    WHERE next_action_date IS NOT NULL
    ORDER BY next_action_date ASC
    LIMIT 15`);
  if (!rows.length) {
    // Fall back to all contacts with any outreach
    const any = q(`SELECT * FROM v_outreach_status ORDER BY last_contact DESC LIMIT 10`);
    if (!any.length) { el.innerHTML = `<div class="empty">No outreach logged yet.</div>`; return; }
    renderOutreachTable(el, any);
    return;
  }
  renderOutreachTable(el, rows);
}
function renderOutreachTable(el, rows) {
  el.innerHTML = `<div class="tbl-wrap"><table class="tbl">
    <thead><tr>
      <th>Name</th>
      <th style="width:110px">Relationship</th>
      <th style="width:96px">Last Contact</th>
      <th style="width:110px">Status</th>
      <th>Next Action</th>
      <th style="width:86px">By</th>
    </tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td style="font-weight:500">${esc(r.name)}</td>
      <td style="font-size:12px;color:var(--muted)">${esc(r.relationship || '—')}</td>
      <td style="font-size:12px;color:var(--muted)">${r.last_contact ? fmtDate(r.last_contact) : '—'}</td>
      <td>${r.latest_status ? `<span class="badge s-${r.latest_status}">${fmtStatus(r.latest_status)}</span>` : '—'}</td>
      <td style="font-size:12px;color:var(--text-2)">${r.next_action ? esc(r.next_action) : '—'}</td>
      <td style="font-size:12px;color:var(--muted)">${r.next_action_date ? fmtDate(r.next_action_date) : '—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ============================================================
// CONSULTING
// ============================================================
function renderConsulting() {
  const el = document.getElementById('consulting');
  const rows = q(`SELECT * FROM v_consulting_pipeline ORDER BY
    CASE status WHEN 'won' THEN 1 WHEN 'negotiating' THEN 2 WHEN 'proposal_sent' THEN 3
    WHEN 'conversation' THEN 4 WHEN 'lead' THEN 5 ELSE 6 END`);
  if (!rows.length) { el.innerHTML = `<div class="empty">No consulting leads yet.</div>`; return; }
  const total = rows.reduce((s, r) => s + (r.total_value || 0), 0);
  el.innerHTML = `<div class="card">
    ${total ? `<div class="card-total">${fmtMoney(total)} pipeline</div>` : ''}
    ${rows.map(r => `<div class="money-row">
      <div>
        <span class="badge s-${r.status}">${fmtStatus(r.status)}</span>
        <span style="font-size:12px;color:var(--muted);margin-left:6px">${r.count} lead${r.count > 1 ? 's' : ''}</span>
      </div>
      <div>
        <div class="money-value">${r.total_value ? fmtMoney(r.total_value) : '—'}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ============================================================
// INCOME
// ============================================================
function renderIncome() {
  const el = document.getElementById('income');
  const rows = q(`SELECT * FROM v_income_summary ORDER BY total DESC`);
  if (!rows.length) { el.innerHTML = `<div class="empty">No income recorded yet.</div>`; return; }
  const total = rows.reduce((s, r) => s + (r.total || 0), 0);
  el.innerHTML = `<div class="card">
    <div class="card-total">${fmtMoney(total)} total</div>
    ${rows.map(r => `<div class="money-row">
      <span class="money-label">${fmtStatus(r.source)}</span>
      <div>
        <div class="money-value">${fmtMoney(r.total)}</div>
        <div class="money-sub">${r.payments} payment${r.payments > 1 ? 's' : ''}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ============================================================
// UTILITIES
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '—';
  try {
    return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  } catch { return d; }
}
function fmtMoney(n) {
  if (!n) return '$0';
  return '$' + Math.round(n).toLocaleString('en-CA');
}
function fmtStatus(s) {
  if (!s) return '—';
  return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function urgency(date, today) {
  if (!date) return 'upcoming';
  if (date < today) return 'overdue';
  if (date === today) return 'today';
  return 'upcoming';
}
