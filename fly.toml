# fly.toml app configuration file generated for my-brain-dashboard-late-cloud-6699 on 2026-04-09T14:45:18-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-brain-dashboard-late-cloud-6699'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  DB_DIR = '/data'
  NODE_ENV = 'production'
  PORT = '8080'
  # SESSION_SECRET (32+ chars) is required — set via `fly secrets set SESSION_SECRET='…'`.

[[mounts]]
  # Forked from the original `brain_data` (zone 3d14, capacity-exhausted) on
  # 2026-04-23 via `fly volumes fork --require-unique-zone`. New volume lives
  # in zone 4b4f (vol_vwnewwkdw65ww39v).
  source = 'brain_data_v2'
  destination = '/data'
  # 60 days is the Fly maximum; well within the 10 GB/mo free snapshot allowance for this volume.
  snapshot_retention = 60

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine up so long agent runs are not killed by Fly idle
  # autostop after the browser disconnects (SSE does not count as inbound traffic).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
