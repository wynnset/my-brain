# fly.toml app configuration file generated for my-brain-dashboard-late-cloud-6699 on 2026-04-09T14:45:18-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-brain-dashboard-late-cloud-6699'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  DB_DIR = '/data'
  NODE_ENV = 'production'
  PORT = '8080'
  # Multi-user: set to "1" and add fly secrets set SESSION_SECRET='…' (32+ chars). Omit for legacy single-tenant + DASHBOARD_PASSWORD.
  BRAIN_MULTI_USER = '1'

[[mounts]]
  source = 'brain_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
