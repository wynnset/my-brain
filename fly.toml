# fly.toml app configuration file generated for my-brain-dashboard-late-cloud-6699 on 2026-04-09T14:45:18-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-brain-dashboard-late-cloud-6699'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  DB_DIR = '/data'
  NODE_ENV = 'production'
  PORT = '8080'
  # Headless Chromium MCP for chat when WebFetch hits bot walls (see mcp-browser-fetch.mjs).
  BRAIN_CHAT_MCP_BROWSER = '1'
  # If you set BRAIN_CHAT_ALLOWED_TOOLS, include mcp__brainBrowser__browser_fetch for Cyrus / web agents.
  # SESSION_SECRET (32+ chars) is required — set via `fly secrets set SESSION_SECRET='…'`.

[[mounts]]
  # Forked from the original `brain_data` (zone 3d14, capacity-exhausted) on
  # 2026-04-23 via `fly volumes fork --require-unique-zone`. New volume lives
  # in zone 4b4f (vol_vwnewwkdw65ww39v).
  source = 'brain_data_v2'
  destination = '/data'
  # 60 days is the Fly maximum; well within the 10 GB/mo free snapshot allowance for this volume.
  # Also pinned on the volume directly via `fly volumes update vol_vwnewwkdw65ww39v --snapshot-retention 60`.
  snapshot_retention = 60

# NOTE: flyctl >= 0.4.42 has a deploy-planner bug on single-volume single-machine
# apps: `fly deploy` insists on creating a new machine and fails with
# "creating a new machine in group 'app' requires an unattached 'brain_data_v2'
# volume". Workaround until upstream fixes it:
#   1) fly deploy --build-only            # build + push the image
#   2) fly machine update <id> --image <pushed-image-ref> --yes
# (Removing snapshot_retention from this file does NOT change the behavior;
# tested 2026-04-28.)

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine up so long agent runs are not killed by Fly idle
  # autostop after the browser disconnects (SSE does not count as inbound traffic).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
